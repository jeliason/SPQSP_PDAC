name: Build Docker Image

on:
  # Manual trigger from GitHub Actions tab
  workflow_dispatch:
    inputs:
      cuda_arch:
        description: 'CUDA architecture (e.g., 80 for A100, 89 for L40s)'
        required: false
        default: '80'
  # Auto-build when Dockerfile changes
  push:
    paths:
      - 'PDAC/sim/Dockerfile'
    branches:
      - io-optimization
      - main

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/spqsp-pdac

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./PDAC/sim
          file: ./PDAC/sim/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          build-args: |
            CUDA_ARCH=${{ github.event.inputs.cuda_arch || '80' }}
            BRANCH=${{ github.ref_name }}
          cache-from: type=gha
          cache-to: type=gha,mode=max